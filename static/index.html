<!-- Simple weekly calendar: grid 7 columns (Mon-Sun) x 3 rows (breakfast/lunch/dinner)
     Header with prev/next week buttons. Loads /static/app.js -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Meal Calendar</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <button id="prev-week">Previous Week</button>
        <h1 id="week-label">Week</h1>
        <button id="next-week">Next Week</button>
    </header>
    <main>
        <div id="calendar" class="calendar-grid"></div>
    </main>
    <script src="/static/app.js"></script>
</body>
</html>
