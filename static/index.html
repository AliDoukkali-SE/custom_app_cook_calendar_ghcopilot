<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Meal Calendar</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260527-1">
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <button id="prev-week">Previous Week</button>
            <h1 id="week-label">Week</h1>
            <button id="next-week">Next Week</button>
        </div>
        <div class="header-right">
            <button id="duplicate-week">Duplicate Week</button>
            <button id="generate-shopping-list" class="button-primary">Generate shopping list</button>
        </div>
    </header>
    <main>
        <div id="calendar" class="calendar-grid"></div>
        <section id="shopping-list-panel" class="shopping-list-panel">
            <h2>Shopping list</h2>
            <div id="shopping-list-empty">Click "Generate shopping list" to load ingredients.</div>
            <ul id="shopping-list-items"></ul>
        </section>
    </main>
    <script src="/static/app.js?v=20260527-1"></script>
</body>
</html>
