<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Weekly Meal Calendar</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: #ffffff;
            border: 1px solid #dce3ed;
            border-radius: 10px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
        }

        .login-card h1 {
            font-size: 1.4rem;
            margin: 0 0 0.4rem;
        }

        .login-card p {
            color: #5a6a80;
            margin: 0 0 1.75rem;
            font-size: 0.95rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            margin-bottom: 1rem;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #1b2533;
        }

        .form-group input {
            padding: 0.55rem 0.75rem;
            border: 1px solid #b8c5d6;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            background: #f6f8fb;
        }

        .form-group input:focus {
            border-color: #0078d4;
            background: #ffffff;
        }

        .submit-btn {
            width: 100%;
            padding: 0.65rem;
            background: #0078d4;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            background: #006abc;
        }

        .error-msg {
            margin-top: 1rem;
            padding: 0.6rem 0.75rem;
            background: #fef0f0;
            border: 1px solid #f5c6cb;
            border-radius: 6px;
            color: #c0392b;
            font-size: 0.875rem;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Weekly Meal Calendar</h1>
        <p>Sign in with your organisation account.</p>
        <form method="POST" action="/auth/login">
            <div class="form-group">
                <label for="username">Email</label>
                <input
                    type="email"
                    id="username"
                    name="username"
                    autocomplete="username"
                    required
                    autofocus
                />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    autocomplete="current-password"
                    required
                />
            </div>
            <button type="submit" class="submit-btn">Sign in</button>
        </form>
        <div id="error-msg" class="error-msg"></div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.has('error')) {
            const el = document.getElementById('error-msg');
            el.textContent = 'Invalid email or password. Please try again.';
            el.classList.add('visible');
        }
    </script>
</body>
</html>
